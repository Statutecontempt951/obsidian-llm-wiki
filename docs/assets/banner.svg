    <text x="220" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8a8a8a" text-anchor="middle" letter-spacing="0.8">vault — concept graph — agent</text>
